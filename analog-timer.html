<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog WebTimer</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #282c34;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            font-size: clamp(10px, 1.5vh, 16px);
            transition: background-color 0.5s, color 0.5s;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #mainContent {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            flex: 1;
            width: 100%;
            padding: 2vh 1vh;
        }
        .fade-out {
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            to {
                background-color: black;
                color: black;
            }
        }

        #additionalText {
            font-size: clamp(16px, 5vh, 80px);
            text-align: center;
            max-width: 95vw;
            word-wrap: break-word;
            flex-shrink: 0;
        }

        #clockContainer {
            position: relative;
            width: clamp(300px, 65vh, 650px);
            height: clamp(300px, 65vh, 650px);
            flex-shrink: 0;
        }

        #pieChart {
            width: 100%;
            height: 100%;
            transition: opacity 0.3s ease;
        }

        .pie-background {
            fill: rgba(255, 255, 255, 0.1);
        }

        .pie-progress {
            fill: #61dafb;
            transition: fill 0.3s ease;
        }

        .fade-out #pieChart,
        .fade-out #minuteLabels,
        .fade-out #additionalText {
            opacity: 0;
            transition: opacity 3s;
        }

        #minuteLabels {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .minute-label {
            position: absolute;
            font-size: clamp(18px, 3vh, 36px);
            font-weight: bold;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #control-box {
            position: fixed;
            bottom: 2vh;
            right: 2vh;
            transition: opacity 0.5s;
            width: auto;
            max-width: min(500px, 40vw);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1vh;
            padding: 0;
        }

        #control-box.visible {
            opacity: 1;
        }

        #control-box:not(.visible) {
            opacity: 0;
        }

        .controls {
            display: flex;
            gap: clamp(5px, 1vw, 15px);
            justify-content: flex-end;
            flex-wrap: wrap;
            transition: opacity 0.5s;
            width: 100%;
        }

        .controls button {
            padding: clamp(5px, 1vh, 10px) clamp(10px, 2vw, 20px);
            font-size: clamp(12px, 1.5vh, 16px);
            cursor: pointer;
            background-color: rgba(74, 85, 104, 0.95);
            color: white;
            border: 1px solid #ffffff;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .controls button:hover {
            background-color: rgba(90, 102, 120, 0.95);
        }

        .settings {
            background-color: rgba(72, 79, 94, 0.95);
            border: 1px solid #ffffff;
            border-radius: 5px;
            padding: clamp(8px, 1.5vh, 15px);
            color: #ffffff;
            font-family: Helvetica, Arial, sans-serif;
            width: 100%;
            max-height: 50vh;
            overflow-y: auto;
        }

        .setting {
            display: flex;
            align-items: center;
            margin: clamp(3px, 0.5vh, 8px) 0;
            font-size: clamp(11px, 1.5vh, 14px);
            gap: clamp(5px, 1vw, 10px);
            flex-wrap: wrap;
        }

        .setting label {
            min-width: clamp(120px, 30%, 190px);
            flex-shrink: 0;
        }

        .setting input[type="text"] {
            padding: clamp(3px, 0.5vh, 6px);
            font-size: clamp(11px, 1.5vh, 14px);
            border: 1px solid #ffffff;
            border-radius: 3px;
            background-color: #5a6678;
            color: white;
        }

        #customText {
            flex: 1;
            min-width: clamp(150px, 40%, 300px);
            max-width: 100%;
        }

        #bgColor, #chartColor {
            width: clamp(50px, 10vw, 70px);
            height: clamp(25px, 3vh, 35px);
            padding: 2px;
            border: 1px solid #ffffff;
            border-radius: 3px;
            background-color: #5a6678;
            cursor: pointer;
        }

        .time-buttons {
            display: flex;
            gap: clamp(5px, 1vw, 10px);
            flex-wrap: wrap;
        }

        .time-button {
            padding: clamp(5px, 1vh, 10px) clamp(10px, 2vw, 20px);
            font-size: clamp(12px, 1.5vh, 16px);
            cursor: pointer;
            background-color: #5a6678;
            color: white;
            border: 2px solid #5a6678;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .time-button:hover {
            background-color: #6a7688;
        }

        .time-button.active {
            background-color: #4a5568;
            border-color: #61dafb;
        }

        /* Responsive Anpassungen für kleinere Bildschirme */
        @media (max-height: 600px) {
            #additionalText {
                font-size: clamp(14px, 4vh, 60px);
                margin-bottom: 1vh;
            }

            #clockContainer {
                width: clamp(200px, 45vh, 400px);
                height: clamp(200px, 45vh, 400px);
            }

            .settings {
                max-height: 30vh;
            }
        }

        @media (max-width: 600px) {
            #control-box {
                bottom: 0;
                right: 0;
                left: 0;
                max-width: 100vw;
                align-items: center;
                padding: 1vh;
                background: linear-gradient(to top, rgba(40, 44, 52, 0.95) 0%, rgba(40, 44, 52, 0.9) 70%, transparent 100%);
            }

            .controls {
                justify-content: center;
            }

            .setting {
                flex-direction: column;
                align-items: flex-start;
            }

            .setting label {
                width: 100%;
            }

            #customText {
                width: 100%;
            }

            .time-buttons {
                width: 100%;
                justify-content: center;
            }

            #clockContainer {
                width: clamp(250px, 55vh, 400px);
                height: clamp(250px, 55vh, 400px);
            }
        }
    </style>
</head>
<body>
    <div id="mainContent">
        <div id="additionalText">gleich gehts weiter...</div>

        <div id="clockContainer">
            <svg id="pieChart" viewBox="0 0 200 200">
                <circle class="pie-background" cx="100" cy="100" r="85" />
                <path id="pieProgress" class="pie-progress" d="" />
            </svg>
            <div id="minuteLabels"></div>
        </div>
    </div>

    <div id="control-box">
        <div class="controls" id="controls">
            <button id="start-button" onclick="startTimer()">Start</button>
            <button id="pause-button" onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Zurücksetzen</button>
        </div>
        <div class="settings" id="settings">
            <div class="setting">
                <label>Zeit auswählen:</label>
                <div class="time-buttons">
                    <button class="time-button active" onclick="selectTime(5)">5 Minuten</button>
                    <button class="time-button" onclick="selectTime(10)">10 Minuten</button>
                    <button class="time-button" onclick="selectTime(15)">15 Minuten</button>
                </div>
            </div>
            <div class="setting">
                <label for="customText">Zusätzlicher Text:</label>
                <input type="text" id="customText" value="gleich gehts weiter..." placeholder="Zusätzlicher Text" onchange="updateDisplay()" />
            </div>
            <div class="setting">
                <label for="bgColor">Hintergrundfarbe:</label>
                <input type="color" id="bgColor" value="#282c34" onchange="updateDisplay()" />
            </div>
            <div class="setting">
                <label for="chartColor">Diagrammfarbe:</label>
                <input type="color" id="chartColor" value="#61dafb" onchange="updateDisplay()" />
            </div>
        </div>
    </div>

    <script>
        let timer;
        let timeLeft;
        let totalTime;
        let selectedMinutes = 5;
        let isRunning = false;
        let isPaused = false;

        const controlBox = document.getElementById('control-box');
        const pauseButton = document.getElementById('pause-button');
        const pieProgress = document.getElementById('pieProgress');

        // Show/hide controls on mouseover
        controlBox.addEventListener('mouseover', () => {
            controlBox.classList.add('visible');
        });

        controlBox.addEventListener('mouseleave', () => {
            if (isRunning) {
                controlBox.classList.remove('visible');
            }
        });

        function selectTime(minutes) {
            if (isRunning) return;

            selectedMinutes = minutes;
            totalTime = minutes * 60;
            timeLeft = totalTime;

            // Update button states
            document.querySelectorAll('.time-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            updateDisplay();
        }

        function createMinuteLabels() {
            const container = document.getElementById('minuteLabels');
            container.innerHTML = '';

            const centerX = 50;
            const centerY = 50;
            const labelRadius = 48; // Closer to the diagram

            for (let i = selectedMinutes; i >= 1; i--) {
                // Start at top (0 degrees) and go clockwise
                // selectedMinutes at 0°, (selectedMinutes-1) at next position clockwise, etc.
                const angle = ((selectedMinutes - i) * (360 / selectedMinutes)) * (Math.PI / 180);
                const x = centerX + labelRadius * Math.sin(angle);
                const y = centerY - labelRadius * Math.cos(angle);

                const label = document.createElement('div');
                label.className = 'minute-label';
                label.textContent = i;
                label.style.left = x + '%';
                label.style.top = y + '%';

                container.appendChild(label);
            }
        }

        function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
            const angleInRadians = (angleInDegrees - 90) * Math.PI / 180.0;
            return {
                x: centerX + (radius * Math.cos(angleInRadians)),
                y: centerY + (radius * Math.sin(angleInRadians))
            };
        }

        function updatePieChart() {
            const progress = timeLeft / totalTime;
            const centerX = 100;
            const centerY = 100;
            const radius = 85;

            // Angle in degrees (360 = full circle, counter-clockwise from top)
            const angle = progress * 360;

            if (progress <= 0) {
                // No pie slice
                pieProgress.setAttribute('d', '');
                return;
            }

            if (progress >= 0.9999) {
                // Full circle - draw two half circles to complete the full pie
                pieProgress.setAttribute('d',
                    `M ${centerX},${centerY} L ${centerX},${centerY - radius} A ${radius},${radius} 0 0,0 ${centerX},${centerY + radius} A ${radius},${radius} 0 0,0 ${centerX},${centerY - radius} Z`
                );
                return;
            }

            // Calculate end point of the arc (counter-clockwise)
            const end = polarToCartesian(centerX, centerY, radius, -angle);
            const largeArcFlag = angle > 180 ? 1 : 0;

            // Draw pie slice: Move to center, line to start (top), arc counter-clockwise to end, close path
            const pathData = [
                `M ${centerX},${centerY}`,
                `L ${centerX},${centerY - radius}`,
                `A ${radius},${radius} 0 ${largeArcFlag},0 ${end.x},${end.y}`,
                'Z'
            ].join(' ');

            pieProgress.setAttribute('d', pathData);
        }

        function startTimer() {
            if (isRunning) return;

            if (timeLeft === undefined || timeLeft <= 0) {
                timeLeft = selectedMinutes * 60;
                totalTime = timeLeft;
            }

            isRunning = true;
            isPaused = false;
            pauseButton.textContent = 'Pause';
            updateDisplay();

            timer = setInterval(() => {
                if (!isPaused) {
                    timeLeft -= 1;
                    if (timeLeft < 0) timeLeft = 0;

                    updateDisplay();

                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        document.body.classList.add('fade-out');
                        isRunning = false;
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;

            if (isPaused) {
                isPaused = false;
                pauseButton.textContent = 'Pause';
            } else {
                isPaused = true;
                pauseButton.textContent = 'Weiter';
            }
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            isPaused = false;
            timeLeft = selectedMinutes * 60;
            totalTime = timeLeft;
            pauseButton.textContent = 'Pause';
            updateDisplay();
            document.body.classList.remove('fade-out');
            controlBox.classList.add('visible');
        }

        function updateDisplay() {
            // Update additional text
            document.getElementById('additionalText').textContent =
                document.getElementById('customText').value;

            // Update colors
            document.body.style.backgroundColor = document.getElementById('bgColor').value;
            document.body.style.color = document.getElementById('chartColor').value;
            pieProgress.style.fill = document.getElementById('chartColor').value;

            // Update pie chart
            if (timeLeft === undefined) {
                timeLeft = selectedMinutes * 60;
                totalTime = timeLeft;
            }
            updatePieChart();

            // Update minute labels
            createMinuteLabels();
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            controlBox.classList.add('visible');
            timeLeft = selectedMinutes * 60;
            totalTime = timeLeft;
            updateDisplay();
        });

        // Update on window resize
        window.addEventListener('resize', () => {
            createMinuteLabels();
        });
    </script>
</body>
</html>
